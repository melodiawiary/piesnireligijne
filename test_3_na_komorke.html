<!DOCTYPE html>
<html lang="pl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Melodia Wiary</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#dfe8ea;
color:#24424a;
}

header{
padding:15px;
position:sticky;
top:0;
background:#dfe8ea;
z-index:10;
}

input{
width:100%;
padding:14px;
border:none;
border-radius:12px;
font-size:20px;
font-weight:700;
box-sizing:border-box;
background:white;
color:#24424a;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:12px;
}

.card{
background:#f4f8f9;
border-radius:12px;
overflow:hidden;
}

.card img{
width:100%;
display:block;
aspect-ratio:16/9;
object-fit:cover;
}

.info{
padding:8px;
}

.title{
font-size:17px;
line-height:1.5;
margin-bottom:10px;
font-weight:700;
text-transform:uppercase;
}

.buttons{
display:flex;
justify-content:space-between;
align-items:center;
}

button,a{
background:none;
border:none;
color:#24424a;
font-size:20px;
cursor:pointer;
text-decoration:none;
}

.bottom{
position:fixed;
bottom:0;
left:0;
right:0;
background:#d6e3e6;
display:flex;
justify-content:space-around;
padding:10px;
}

.spacer{
height:70px;
}

@media(min-width:700px){

.grid{
grid-template-columns:
repeat(auto-fill,minmax(220px,1fr));
}

}

</style>
</head>

<body>

<header>
<input
type="text"
id="search"
placeholder="SZUKAJ PIEŚNI...">
</header>

<div class="grid" id="videos"></div>

<div class="spacer"></div>

<div class="bottom">

<button onclick="showAll()">
🎵
</button>

<button onclick="showFavs()">
❤️
</button>

<button onclick="sendMessenger()" style="background:none;border:none;cursor:pointer;padding:0;">
<svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
<circle cx="18" cy="18" r="18" fill="url(#msg_grad)"/>
<defs><linearGradient id="msg_grad" x1="0" y1="36" x2="36" y2="0" gradientUnits="userSpaceOnUse">
<stop offset="0%" stop-color="#0078FF"/><stop offset="100%" stop-color="#A334FA"/>
</linearGradient></defs>
<path d="M18 7C11.925 7 7 11.6 7 17.3c0 3.2 1.575 6.05 4.05 7.95V29l3.75-2.05c1 .275 2.05.425 3.2.425 6.075 0 11-4.6 11-10.3C29 11.6 24.075 7 18 7zm1.1 13.85l-2.8-2.975-5.475 2.975 6.025-6.4 2.875 2.975 5.4-2.975-6.025 6.4z" fill="white"/>
</svg>
</button>

<button onclick="sendEmail()">
✉️
</button>

</div>

<script>

const SHEET_ID =
"1aidR9y-TH5uAU_JFjeCuTDGhnDExpMVefn45AhW0UdM";

const url =
`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

let videos = [];
let showingFavs = false;

const container =
document.getElementById("videos");

fetch(url)
.then(res => res.text())
.then(text => {

const json =
JSON.parse(
text.substring(47).slice(0,-2)
);

const rows =
json.table.rows;

videos = rows.map(r => ({

title:
r.c[0]?.v || "",

category:
r.c[1]?.v || "",

order:
parseInt(r.c[4]?.v || 0),

duration:
(typeof r.c[3]?.v === "string" ? r.c[3].v : (r.c[3]?.f || "0:00")),

youtube:
r.c[7]?.v || "",

image:
r.c[8]?.v || ""

}))

.sort((a,b) => b.order - a.order);

render(videos);

});

function render(list){

container.innerHTML = "";

const favs =
JSON.parse(
localStorage.getItem("favs") || "[]"
);

list.forEach(video => {

const card =
document.createElement("div");

const liked =
favs.includes(String(video.order));

card.className = "card";

card.innerHTML = `

<img src="${video.image}">

<div class="info">

<div class="title">
${video.order} - ${video.title}
</div>

<div class="buttons">

<a href="${video.youtube}"
target="_blank">
▶️
</a>

<button onclick=
"toggleFav('${video.order}')">
${liked ? "❤️" : "🤍"}
</button>

</div>

</div>
`;

container.appendChild(card);

});

}

function toggleFav(order){

let favs =
JSON.parse(
localStorage.getItem("favs") || "[]"
);

if(favs.includes(order)){

favs =
favs.filter(f => f !== order);

}else{

favs.push(order);

}

localStorage.setItem(
"favs",
JSON.stringify(favs)
);

if(showingFavs){

showFavs();

}else{

render(videos);

}

}

function showFavs(){

showingFavs = true;

const favs =
JSON.parse(
localStorage.getItem("favs") || "[]"
);

const filtered =
videos.filter(v =>
favs.includes(String(v.order))
);

render(filtered);

}

function showAll(){

showingFavs = false;

render(videos);

}

function timeToSeconds(t){
if(!t || typeof t !== "string") return 0;
const parts = t.replace(/[^\d:]/g,"").split(":").map(Number);
if(parts.length === 2) return (parts[0]||0)*60+(parts[1]||0);
if(parts.length === 3) return (parts[0]||0)*3600+(parts[1]||0)*60+(parts[2]||0);
return 0;
}

function buildDiscs(selected){
const maxTime = 50*60;
const discs = [];
selected.forEach(v => {
const sT = timeToSeconds(v.duration);
let placed = false;
for(let i = 0; i < discs.length; i++){
const used = discs[i].reduce((acc,x) => acc+timeToSeconds(x.duration),0);
if(used+sT <= maxTime){ discs[i].push(v); placed=true; break; }
}
if(!placed) discs.push([v]);
});
return discs;
}

function getFavMessage(){

const favs =
JSON.parse(
localStorage.getItem("favs") || "[]"
);

const selected =
videos.filter(v =>
favs.includes(String(v.order))
);

if(selected.length === 0) return "";

const discs = buildDiscs(selected);

let msg = "Szczęść Boże Melodio Wiary!\nNiech będzie pochwalony Jezus Chrystus.\n\nJestem zainteresowany/a płytami z tą muzyką:\n\n";

discs.forEach((disc, idx) => {
msg += "PŁYTA NUMER " + (idx+1) + ":\n";
disc.forEach(v => {
msg += "\u2022 " + v.order + " - " + v.title + "\n";
});
msg += "\n";
});

return msg;

}

function sendMessenger(){

const msg = getFavMessage();
if(!msg){ alert("Nie masz jeszcze ulubionych piosenek!"); return; }

window.open(
"https://m.me/MelodiaWiary?text=" + encodeURIComponent(msg), "_blank");

}

function sendEmail(){

const msg = getFavMessage();
if(!msg){ alert("Nie masz jeszcze ulubionych piosenek!"); return; }

window.open(
"mailto:melodiawiary@gmail.com?subject=Zam%C3%B3wienie+p%C5%82yt+Melodia+Wiary&body=" + encodeURIComponent(msg), "_blank");

}

document
.getElementById("search")
.addEventListener("input", e => {

const value =
e.target.value.toLowerCase();

const filtered =
videos.filter(v =>

v.title
.toLowerCase()
.includes(value)

||

v.category
.toLowerCase()
.includes(value)

);

render(filtered);

});

</script>

</body>
</html>
