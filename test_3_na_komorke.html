<script>

const SHEET_ID =
"1aidR9y-TH5uAU_JFjeCuTDGhnDExpMVefn45AhW0UdM";

const url =
`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

let videos = [];
let showingFavs = false;
let currentCat = "Wszystkie";

const container =
document.getElementById("videos");

fetch(url)
.then(res => res.text())
.then(text => {

const json =
JSON.parse(
text.substring(47).slice(0,-2)
);

const rows =
json.table.rows;

videos = rows.map(r => ({

title:
r.c[0]?.v || "",

category:
r.c[1]?.v || "",

order:
parseInt(r.c[4]?.v || 0),

duration:
r.c[3]?.v || "0:00",

youtube:
r.c[7]?.v || "",

image:
r.c[8]?.v || ""

}))

.sort((a,b) => b.order - a.order);

buildCatBar();
render(videos);

});

function render(list){

container.innerHTML = "";

const favs =
JSON.parse(
localStorage.getItem("favs") || "[]"
);

if(currentCat === "❤️ Ulubione" && list.length > 0){
const playBtn = document.createElement("button");
playBtn.id = "play-favs-btn";
playBtn.innerHTML = "▶️ ODTWÓRZ ULUBIONE";
playBtn.onclick = () => startPlayer(list);
container.appendChild(playBtn);
}

list.forEach(video => {

const card =
document.createElement("div");

const liked =
favs.includes(video.youtube);

card.className = "card";

card.innerHTML = `

<img src="${video.image}">

<div class="info">

<div class="title">
${video.order} - ${video.title}
</div>

<div class="buttons">

<a href="${video.youtube}"
target="_blank">
▶️
</a>

<button onclick=
"toggleFav('${video.youtube}')">
${liked ? "❤️" : "🤍"}
</button>

</div>

</div>
`;

container.appendChild(card);

});

}

function toggleFav(link){

let favs =
JSON.parse(
localStorage.getItem("favs") || "[]"
);

if(favs.includes(link)){

favs =
favs.filter(f => f !== link);

}else{

favs.push(link);

}

localStorage.setItem(
"favs",
JSON.stringify(favs)
);

buildCatBar();

const searchVal = document.getElementById("search").value.trim();
if(searchVal !== ""){
let pool = videos;
if(currentCat === "❤️ Ulubione"){
const favs2 = JSON.parse(localStorage.getItem("favs") || "[]");
pool = videos.filter(v => favs2.includes(v.youtube));
} else if(currentCat !== "Wszystkie"){
pool = videos.filter(v => v.category.split(",").map(c=>c.trim()).includes(currentCat));
}
render(pool.filter(v =>
v.title.toLowerCase().includes(searchVal.toLowerCase()) ||
v.category.toLowerCase().includes(searchVal.toLowerCase())
));
} else if(currentCat === "❤️ Ulubione"){
setFavCategory();
} else if(currentCat !== "Wszystkie"){
setCategory(currentCat);
} else {
render(videos);
}

}

function showFavs(){

showingFavs = false;
currentCat = "❤️ Ulubione";

const favs =
JSON.parse(
localStorage.getItem("favs") || "[]"
);

const filtered =
videos.filter(v =>
favs.includes(v.youtube)
);

render(filtered);

}

function showAll(){

showingFavs = false;
currentCat = "Wszystkie";
buildCatBar();
render(videos);

}

function timeToSeconds(t){
if(!t || typeof t !== "string") return 0;
const parts = t.replace(/[^\d:]/g,"").split(":").map(Number);
if(parts.length === 2) return (parts[0]||0)*60+(parts[1]||0);
if(parts.length === 3) return (parts[0]||0)*3600+(parts[1]||0)*60+(parts[2]||0);
return 0;
}

function buildDiscs(selected){
const maxTime = 50*60;
const discs = [];
selected.forEach(v => {
const sT = timeToSeconds(v.duration);
let placed = false;
for(let i = 0; i < discs.length; i++){
const used = discs[i].reduce((acc,x) => acc+timeToSeconds(x.duration),0);
if(used+sT <= maxTime){ discs[i].push(v); placed=true; break; }
}
if(!placed) discs.push([v]);
});
return discs;
}

function getFavMessage(){

const favs =
JSON.parse(
localStorage.getItem("favs") || "[]"
);

const selected =
videos.filter(v =>
favs.includes(v.youtube)
);

if(selected.length === 0) return "";

const discs = buildDiscs(selected);

let msg = "Szczęść Boże Melodio Wiary!\nNiech będzie pochwalony Jezus Chrystus.\n\nJestem zainteresowany/a płytami z tą muzyką:\n\n";

discs.forEach((disc, idx) => {
msg += "PŁYTA NUMER " + (idx+1) + ":\n";
disc.forEach(v => {
msg += "• " + v.order + " - " + v.title + "\n";
});
msg += "\n";
});

return msg;

}

function sendMessenger(){

const msg = getFavMessage();
if(!msg){ alert("Nie masz jeszcze ulubionych piosenek!"); return; }

window.open("https://m.me/MelodiaWiary?text=" + encodeURIComponent(msg), "_blank");

}

function sendEmail(){

const msg = getFavMessage();
if(!msg){ alert("Nie masz jeszcze ulubionych piosenek!"); return; }

document.getElementById("email-modal-overlay").classList.add("open");

}

function closeEmailModal(){
document.getElementById("email-modal-overlay").classList.remove("open");
}

function doOpenEmail(){
closeEmailModal();
const msg = getFavMessage();
window.location.href =
"mailto:melodiawiary@gmail.com?subject=Zam%C3%B3wienie+p%C5%82yt+Melodia+Wiary&body=" + encodeURIComponent(msg);
}

function doCopyOrder(){
const msg = getFavMessage();
navigator.clipboard.writeText(msg).then(() => {
closeEmailModal();
alert("✅ Skopiowano! Wklej zamówienie w dowolną wiadomość.");
}).catch(() => {
closeEmailModal();
alert("Nie udało się skopiować. Spróbuj ręcznie.");
});
}

document
.getElementById("search")
.addEventListener("input", e => {

const value =
e.target.value.toLowerCase();

let pool = videos;

if(currentCat === "❤️ Ulubione"){
const favs = JSON.parse(localStorage.getItem("favs") || "[]");
pool = videos.filter(v => favs.includes(v.youtube));
} else if(currentCat !== "Wszystkie"){
pool = videos.filter(v =>
v.category.split(",").map(c=>c.trim()).includes(currentCat)
);
}

const filtered = pool.filter(v =>
v.title.toLowerCase().includes(value)
||
v.category.toLowerCase().includes(value)
);

render(filtered);

});


window.addEventListener("scroll", () => {
const btn = document.getElementById("back-to-top");
if(window.scrollY > 300) btn.classList.add("visible");
else btn.classList.remove("visible");
});

let playerList = [];
let playerIndex = 0;
let playerPlaying = true;

function getYTId(url){
const match = url.match(/(?:v=|youtu\.be\/|embed\/)([^&?/]+)/);
return match ? match[1] : url;
}

function startPlayer(list){
playerList = list.filter(v => v.youtube);
playerIndex = 0;
playerPlaying = true;
loadPlayerTrack();
document.getElementById("player-bar").classList.add("visible");
}

function loadPlayerTrack(){
if(playerList.length === 0) return;
const v = playerList[playerIndex];
const id = getYTId(v.youtube);
document.getElementById("player-iframe").src =
"https://www.youtube.com/embed/" + id + "?autoplay=1&rel=0";
document.getElementById("player-title").textContent =
"▶️ " + v.order + " - " + v.title;
const next = playerList[playerIndex + 1];
document.getElementById("player-next").textContent =
next ? "Następna: " + next.order + " - " + next.title : "Ostatnia piosenka";
document.getElementById("player-play-btn").textContent = "⏸️";
playerPlaying = true;
}

function playerNext(){
if(playerIndex < playerList.length - 1){
playerIndex++;
loadPlayerTrack();
}
}

function playerPrev(){
if(playerIndex > 0){
playerIndex--;
loadPlayerTrack();
}
}

function playerToggle(){
const iframe = document.getElementById("player-iframe");
const btn = document.getElementById("player-play-btn");
if(playerPlaying){
iframe.src = iframe.src.replace("autoplay=1","autoplay=0");
btn.textContent = "▶️";
playerPlaying = false;
} else {
iframe.src = iframe.src.replace("autoplay=0","autoplay=1");
btn.textContent = "⏸️";
playerPlaying = true;
}
}

function closePlayer(){
document.getElementById("player-bar").classList.remove("visible");
document.getElementById("player-iframe").src = "";
}

function openDrawer(){
document.getElementById("drawer").classList.add("open");
document.getElementById("drawer-overlay").classList.add("open");
}

function closeDrawer(){
document.getElementById("drawer").classList.remove("open");
document.getElementById("drawer-overlay").classList.remove("open");
}

let touchStartX = 0;
document.addEventListener("touchstart", e => {
touchStartX = e.touches[0].clientX;
});
document.addEventListener("touchend", e => {
const diff = e.changedTouches[0].clientX - touchStartX;
if(diff > 60 && touchStartX < 40) openDrawer();
if(diff < -60) closeDrawer();
});


function buildCatBar(){
const catSet = new Set();
videos.forEach(v => {
v.category.split(",").forEach(c => {
const trimmed = c.trim();
if(trimmed) catSet.add(trimmed);
});
});

const cats = ["Wszystkie", "❤️ Ulubione", ...Array.from(catSet).sort()];
const bar = document.getElementById("cat-bar");
bar.innerHTML = "";

const favs = JSON.parse(localStorage.getItem("favs") || "[]");

cats.forEach(cat => {
const btn = document.createElement("button");
const isUlubione = cat === "❤️ Ulubione";
const isWszystkie = cat === "Wszystkie";
btn.className = "cat-btn" + (cat === currentCat ? " active" : "");
if(isUlubione) btn.style.borderColor = "#e53935";
if(isUlubione && cat !== currentCat) btn.style.color = "#e53935";

let count = "";
if(isWszystkie) count = videos.length;
else if(isUlubione) count = favs.length;
else count = videos.filter(v => v.category.split(",").map(c=>c.trim()).includes(cat)).length;

btn.textContent = cat + " (" + count + ")";
btn.onclick = () => isUlubione ? setFavCategory() : setCategory(cat);
bar.appendChild(btn);
});
}

function setFavCategory(){
currentCat = "❤️ Ulubione";
showingFavs = false;
buildCatBar();
showFavs();
}

function setCategory(cat){
currentCat = cat;
showingFavs = false;
buildCatBar();
if(cat === "Wszystkie"){
render(videos);
} else {
const filtered = videos.filter(v =>
v.category.split(",").map(c => c.trim()).includes(cat)
);
render(filtered);
}
}

</script>
