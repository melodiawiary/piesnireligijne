}

#drawer-overlay{

top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.4);
z-index:999;
display:none;
}

#drawer-overlay.open{
display:block;
}

.header-row{
display:flex;
align-items:center;
gap:10px;
}

#drawer-btn{
background:none;
border:none;
font-size:28px;
cursor:pointer;
color:#24424a;
padding:0;
flex-shrink:0;
}

header input{
flex:1;
}

.drawer-logo{
display:block;
width:110px;
height:110px;
border-radius:50%;
margin:30px auto 15px;
object-fit:cover;
border:3px solid #24424a;
}

.drawer-blessing{
text-align:center;
font-size:15px;
font-weight:700;
color:#24424a;
padding:0 20px 15px;
border-bottom:2px solid #d6e3e6;
line-height:1.5;
}

.drawer-email{
text-align:center;
padding:12px 20px;
font-size:14px;
font-weight:700;
color:#24424a;
border-bottom:2px solid #d6e3e6;
}

.drawer-email a{
color:#0078FF;
font-size:14px;
}

.drawer-section{
padding:15px 20px 5px;
font-size:12px;
font-weight:900;
text-transform:uppercase;
color:#888;
letter-spacing:1px;
}

.drawer-links{
padding:5px 15px 15px;
display:flex;
flex-direction:column;
gap:10px;
border-bottom:2px solid #d6e3e6;
}

.drawer-link{
display:flex;
align-items:center;
gap:12px;
padding:12px 15px;
border-radius:12px;
background:white;
text-decoration:none;
color:#24424a;
font-weight:700;
font-size:15px;
box-shadow:0 2px 6px rgba(0,0,0,0.06);
}

.drawer-link img{
width:28px;
height:28px;
border-radius:6px;
}

.drawer-motto{
text-align:center;
padding:20px 20px 30px;
font-size:14px;
font-weight:900;
color:#24424a;
line-height:1.6;
font-style:italic;
}

@media(min-width:700px){

.grid{
grid-template-columns:
repeat(auto-fill,minmax(220px,1fr));
}

}

</style>
</head>

    </a>
    <a href="https://www.instagram.com/melodiawiary/" target="_blank" class="drawer-link">

<header>
<div class="header-row">
<button id="drawer-btn" onclick="openDrawer()">☰</button>
<input
type="text"
id="search"
placeholder="SZUKAJ PIEŚNI...">
</div>
</header>

<div class="grid" id="videos"></div>

<div class="spacer"></div>

<div class="bottom">

<button onclick="showAll()">
WSZYSTKIE PIEŚNI
</button>

<button onclick="showFavs()">
❤️
</button>

<button onclick="sendMessenger()" style="background:none;border:none;cursor:pointer;padding:0;">
<svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
<circle cx="18" cy="18" r="18" fill="url(#msg_grad)"/>
<defs><linearGradient id="msg_grad" x1="0" y1="36" x2="36" y2="0" gradientUnits="userSpaceOnUse">
<stop offset="0%" stop-color="#0078FF"/><stop offset="100%" stop-color="#A334FA"/>
</linearGradient></defs>
<path d="M18 7C11.925 7 7 11.6 7 17.3c0 3.2 1.575 6.05 4.05 7.95V29l3.75-2.05c1 .275 2.05.425 3.2.425 6.075 0 11-4.6 11-10.3C29 11.6 24.075 7 18 7zm1.1 13.85l-2.8-2.975-5.475 2.975 6.025-6.4 2.875 2.975 5.4-2.975-6.025 6.4z" fill="white"/>
</svg>
</button>

✉️
</button>

</div>

<script>

const SHEET_ID =
"1aidR9y-TH5uAU_JFjeCuTDGhnDExpMVefn45AhW0UdM";

const url =
`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

let videos = [];
let showingFavs = false;

const container =
document.getElementById("videos");

fetch(url)
.then(res => res.text())
.then(text => {

const json =
JSON.parse(
text.substring(47).slice(0,-2)
);

const rows =
json.table.rows;

videos = rows.map(r => ({

title:
r.c[0]?.v || "",

category:
r.c[1]?.v || "",

order:
parseInt(r.c[4]?.v || 0),

duration:
r.c[3]?.v || "0:00",

youtube:
r.c[7]?.v || "",

image:
r.c[8]?.v || ""

}))

.sort((a,b) => b.order - a.order);

render(videos);

});

function render(list){

container.innerHTML = "";

const favs =
JSON.parse(
localStorage.getItem("favs") || "[]"
);

list.forEach(video => {

const card =
document.createElement("div");

const liked =
favs.includes(video.youtube);

card.className = "card";

card.innerHTML = `

<img src="${video.image}">

<div class="info">

<div class="title">
${video.order} - ${video.title}
</div>

<div class="buttons">

<a href="${video.youtube}"
target="_blank">
▶️
</a>

<button onclick=
"toggleFav('${video.youtube}')">
${liked ? "❤️" : "🤍"}
</button>

</div>

</div>
`;

container.appendChild(card);

});

}

function toggleFav(link){

let favs =
JSON.parse(
localStorage.getItem("favs") || "[]"
);

if(favs.includes(link)){

favs =
favs.filter(f => f !== link);

}else{

favs.push(link);

}

localStorage.setItem(
"favs",
JSON.stringify(favs)
);

if(showingFavs){

showFavs();

}else{

render(videos);

}

}

function showFavs(){

showingFavs = true;

const favs =
JSON.parse(
localStorage.getItem("favs") || "[]"
);

const filtered =
videos.filter(v =>
favs.includes(v.youtube)
);

render(filtered);

}

function showAll(){

showingFavs = false;

render(videos);

}

function timeToSeconds(t){
if(!t || typeof t !== "string") return 0;
const parts = t.replace(/[^\d:]/g,"").split(":").map(Number);
if(parts.length === 2) return (parts[0]||0)*60+(parts[1]||0);
if(parts.length === 3) return (parts[0]||0)*3600+(parts[1]||0)*60+(parts[2]||0);
return 0;
}

function buildDiscs(selected){
const maxTime = 50*60;
const discs = [];
selected.forEach(v => {
const sT = timeToSeconds(v.duration);
let placed = false;
for(let i = 0; i < discs.length; i++){
const used = discs[i].reduce((acc,x) => acc+timeToSeconds(x.duration),0);
if(used+sT <= maxTime){ discs[i].push(v); placed=true; break; }
}
if(!placed) discs.push([v]);
});
return discs;
}

function getFavMessage(){

const favs =
JSON.parse(
localStorage.getItem("favs") || "[]"
);

const selected =
videos.filter(v =>
favs.includes(v.youtube)
);

if(selected.length === 0) return "";

const discs = buildDiscs(selected);

let msg = "Szczęść Boże Melodio Wiary!\nNiech będzie pochwalony Jezus Chrystus.\n\nJestem zainteresowany/a płytami z tą muzyką:\n\n";

discs.forEach((disc, idx) => {
msg += "PŁYTA NUMER " + (idx+1) + ":\n";
disc.forEach(v => {
msg += "• " + v.order + " - " + v.title + "\n";
});
msg += "\n";
});

return msg;

}

function sendMessenger(){

const msg = getFavMessage();
if(!msg){ alert("Nie masz jeszcze ulubionych piosenek!"); return; }

window.open("https://m.me/MelodiaWiary?text=" + encodeURIComponent(msg), "_blank");

}

function sendEmail(){

const msg = getFavMessage();
if(!msg){ alert("Nie masz jeszcze ulubionych piosenek!"); return; }

window.location.href =
"mailto:melodiawiary@gmail.com?subject=Zam%C3%B3wienie+p%C5%82yt+Melodia+Wiary&body=" + encodeURIComponent(msg);

}

document
.getElementById("search")
.addEventListener("input", e => {

const value =
e.target.value.toLowerCase();

const filtered =
videos.filter(v =>

v.title
.toLowerCase()
.includes(value)

||

v.category
.toLowerCase()
.includes(value)

);

render(filtered);

});


function openDrawer(){
document.getElementById("drawer").classList.add("open");
document.getElementById("drawer-overlay").classList.add("open");
}

function closeDrawer(){
document.getElementById("drawer").classList.remove("open");
document.getElementById("drawer-overlay").classList.remove("open");
}

let touchStartX = 0;
document.addEventListener("touchstart", e => {
touchStartX = e.touches[0].clientX;
});
document.addEventListener("touchend", e => {
const diff = e.changedTouches[0].clientX - touchStartX;
if(diff > 60 && touchStartX < 40) openDrawer();
if(diff < -60) closeDrawer();
});

</script>

</body>
