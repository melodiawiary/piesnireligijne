<!DOCTYPE html>
<html lang="pl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Melodia Wiary</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#dfe8ea;
color:#24424a;
}

header{
padding:15px;
position:sticky;
top:0;
background:#dfe8ea;
z-index:10;
}

input{
width:100%;
padding:14px;
border:none;
border-radius:12px;
font-size:20px;
font-weight:700;
box-sizing:border-box;
background:white;
color:#24424a;
}

.categories{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:12px;
}

.category{
background:#f4f8f9;
border-radius:16px;
padding:25px 10px;
text-align:center;
font-size:18px;
font-weight:700;
cursor:pointer;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:12px;
}

.card{
background:#f4f8f9;
border-radius:12px;
overflow:hidden;
}

.card img{
width:100%;
display:block;
aspect-ratio:16/9;
object-fit:cover;
}

.info{
padding:8px;
}

.title{
font-size:17px;
line-height:1.5;
margin-bottom:10px;
font-weight:700;
text-transform:uppercase;
}

.buttons{
display:flex;
justify-content:space-between;
align-items:center;
}

button,a{
background:none;
border:none;
color:#24424a;
font-size:20px;
cursor:pointer;
text-decoration:none;
}

.bottom{
position:fixed;
bottom:0;
left:0;
right:0;
background:#d6e3e6;
display:flex;
justify-content:space-around;
padding:10px;
}

.spacer{
height:70px;
}

.hidden{
display:none;
}

@media(min-width:700px){

.grid{
grid-template-columns:
repeat(auto-fill,minmax(220px,1fr));
}

.categories{
grid-template-columns:
repeat(auto-fill,minmax(220px,1fr));
}

}

</style>
</head>

<body>

<header>

<input
type="text"
id="search"
placeholder="SZUKAJ PIEŚNI...">

</header>

<div class="categories" id="categories"></div>

<div class="grid hidden" id="videos"></div>

<div class="spacer"></div>

<div class="bottom">

<button onclick="showCategories()">
POWRÓT
</button>

<button onclick="showFavs()">
❤️
</button>

<button onclick="sendMessenger()">
💬
</button>

<button onclick="sendEmail()">
✉️
</button>

</div>

<script>

const SHEET_ID =
"1aidR9y-TH5uAU_JFjeCuTDGhnDExpMVefn45AhW0UdM";

const url =
`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

let videos = [];

const container =
document.getElementById("videos");

const categoriesContainer =
document.getElementById("categories");

fetch(url)

.then(res => res.text())

.then(text => {

const json =
JSON.parse(
text.substring(47).slice(0,-2)
);

const rows =
json.table.rows;

videos = rows.map(r => ({

title:
r.c[0]?.v || "",

category:
r.c[1]?.v || "",

order:
parseInt(r.c[4]?.v || 0),

youtube:
r.c[7]?.v || "",

image:
r.c[8]?.v || ""

}))

.sort((a,b) => b.order - a.order);

createCategories();

});

function createCategories(){

const uniqueCategories =
[
...new Set(

videos.flatMap(v =>

v.category
.split(",")
.map(c => c.trim())

)

)

]

.sort((a,b) =>
a.localeCompare(
b,
'pl'
)
);

categoriesContainer.innerHTML = "";

uniqueCategories.forEach(cat => {

const div =
document.createElement("div");

div.className = "category";

div.innerHTML = cat;

div.onclick = () => {

const filtered =
videos.filter(v =>
v.category.includes(cat)
);

render(filtered);

};

categoriesContainer.appendChild(div);

});

const all =
document.createElement("div");

all.className = "category";

all.innerHTML = "WSZYSTKIE PIEŚNI";

all.onclick = () => {

render(videos);

};

categoriesContainer.appendChild(all);

}

function render(list){

categoriesContainer
.classList.add("hidden");

container
.classList.remove("hidden");

container.innerHTML = "";

const favs =
JSON.parse(
localStorage.getItem("favs") || "[]"
);

list.forEach(video => {

const card =
document.createElement("div");

const liked =
favs.includes(video.youtube);

card.className = "card";

card.innerHTML = `

<img src="${video.image}">

<div class="info">

<div class="title">
${video.order} - ${video.title}
</div>

<div class="buttons">

<a href="${video.youtube}"
target="_blank">
▶️
</a>

<button onclick=
"toggleFav('${video.youtube}')">
${liked ? "❤️" : "🤍"}
</button>

</div>

</div>
`;

container.appendChild(card);

});

}

function toggleFav(link){

let favs =
JSON.parse(
localStorage.getItem("favs") || "[]"
);

if(favs.includes(link)){

favs =
favs.filter(f => f !== link);

}else{

favs.push(link);

}

localStorage.setItem(
"favs",
JSON.stringify(favs)
);

}

function showFavs(){

const favs =
JSON.parse(
localStorage.getItem("favs") || "[]"
);

const filtered =
videos.filter(v =>
favs.includes(v.youtube)
);

render(filtered);

}

function showCategories(){

container.classList.add("hidden");

categoriesContainer
.classList.remove("hidden");

}

function getFavMessage(){

const favs =
JSON.parse(
localStorage.getItem("favs") || "[]"
);

const selected =
videos.filter(v =>
favs.includes(v.youtube)
);

return selected
.map(v =>
"• " +
v.order +
" - " +
v.title
)
.join("%0A");

}

function sendMessenger(){

const list =
getFavMessage();

const message =
encodeURIComponent(
"Szczęść Boże, Niech będzie pochwalony Jezus Chrystus.\n\nOto moja lista utworów, którymi jestem zainteresowany/a:\n\n"
) + list;

window.location.href =
`https://m.me/MelodiaWiary?text=${message}`;

}

function sendEmail(){

const list =
getFavMessage();

const message =
encodeURIComponent(
"Szczęść Boże, Niech będzie pochwalony Jezus Chrystus.\n\nOto moja lista utworów, którymi jestem zainteresowany/a:\n\n"
) + list;

window.location.href =
`mailto:melodiawiary@gmail.com?subject=Lista utworów&body=${message}`;

}

document
.getElementById("search")
.addEventListener("input", e => {

const value =
e.target.value.toLowerCase();

const filtered =
videos.filter(v =>

v.title
.toLowerCase()
.includes(value)

||

v.category
.toLowerCase()
.includes(value)

);

render(filtered);

});

</script>

</body>
</html>
